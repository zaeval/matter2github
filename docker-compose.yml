services:
  mattermost-github-issue-api:
    build: .
    container_name: mattermost-github-issue-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # The app listens on $PORT inside the container (see src/server.js),
      # so publish host:container on the same port to keep them in sync.
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
